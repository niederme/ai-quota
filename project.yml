name: AIQuota

options:
  bundleIdPrefix: com.niederme
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupOrdering:
    - pattern: AIQuota
      order: [Views, ViewModels, Resources]

# ── Version / Build number ─────────────────────────────────────────────────
# Bump CURRENT_PROJECT_VERSION for each release build (shown in Xcode Organizer).
# Bump MARKETING_VERSION when the user-facing version changes (1.0, 1.1, 2.0…).
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"

packages:
  AIQuotaKit:
    path: Packages/AIQuotaKit

targets:

  # ── Main App ──────────────────────────────────────────────────────────────

  AIQuota:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: AIQuota
        excludes:
          - Resources/AIQuota.entitlements
    resources:
      - path: AIQuota/Resources
        excludes:
          - AIQuota.entitlements
    dependencies:
      - package: AIQuotaKit
      - target: AIQuotaWidget
        embed: true
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.niederme.AIQuota
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 289GY9L343
        CODE_SIGN_ENTITLEMENTS: AIQuota/Resources/AIQuota.entitlements
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        INFOPLIST_FILE: AIQuota/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Menubar-only app — no Dock icon
        # LSUIElement is set in Info.plist
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

  # ── Widget Extension ──────────────────────────────────────────────────────

  AIQuotaWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: AIQuotaWidget
        excludes:
          - Resources/AIQuotaWidget.entitlements
    dependencies:
      - package: AIQuotaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.niederme.AIQuota.widget
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 289GY9L343
        CODE_SIGN_ENTITLEMENTS: AIQuotaWidget/Resources/AIQuotaWidget.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: AIQuotaWidget/Resources/Info.plist

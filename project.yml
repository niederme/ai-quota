name: AIQuota

options:
  bundleIdPrefix: com.niederme
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupOrdering:
    - pattern: AIQuota
      order: [Views, ViewModels, Resources]

# ── Version / Build number ─────────────────────────────────────────────────
# MARKETING_VERSION = user-facing version (1.0, 1.1, 2.0…) — bump manually.
# CURRENT_PROJECT_VERSION = fallback; overridden at build time by git commit count.
settings:
  base:
    MARKETING_VERSION: "1.9.6"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AIQuotaKit:
    path: Packages/AIQuotaKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.9.0

schemes:
  AIQuota:
    build:
      targets:
        AIQuota: all
        AIQuotaWidget: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:

  # ── Main App ──────────────────────────────────────────────────────────────

  AIQuota:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: AIQuota
        excludes:
          - Resources/AIQuota.entitlements
    resources:
      - path: AIQuota/Resources
        excludes:
          - AIQuota.entitlements
    dependencies:
      - package: AIQuotaKit
      - package: Sparkle
        product: Sparkle
      - target: AIQuotaWidget
        embed: true
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.niederme.AIQuota
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 289GY9L343
        CODE_SIGN_ENTITLEMENTS: AIQuota/Resources/AIQuota.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        INFOPLIST_FILE: AIQuota/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Menubar-only app — no Dock icon
        # LSUIElement is set in Info.plist
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          echo "Build number → $BUILD"
        basedOnDependencyAnalysis: false

  # ── Widget Extension ──────────────────────────────────────────────────────

  AIQuotaWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: AIQuotaWidget
        excludes:
          - Resources/AIQuotaWidget.entitlements
    dependencies:
      - package: AIQuotaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.niederme.AIQuota.widget
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 289GY9L343
        CODE_SIGN_ENTITLEMENTS: AIQuotaWidget/Resources/AIQuotaWidget.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: AIQuotaWidget/Resources/Info.plist
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          echo "Build number → $BUILD"
        basedOnDependencyAnalysis: false
